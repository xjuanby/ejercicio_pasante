services:
  db:
    image: postgres:16-alpine
    container_name: pasante_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pasante}
      POSTGRES_USER: ${DB_USERNAME:-pasante}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - pasante_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pasante}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pasante_backend
    restart: unless-stopped
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pasante}
      DB_USERNAME: ${DB_USERNAME:-pasante}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pasante_net

  frontend:
    build:
      context: ./frontend
    container_name: pasante_frontend
    restart: unless-stopped
    environment:
      API_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - pasante_net

networks:
  pasante_net:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
